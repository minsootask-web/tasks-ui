<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#191919" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tako">
<title>Tako</title>
<link rel="manifest" href="manifest.json">
<!-- 파비콘(탭): 투명 배경 SVG + PNG 폴백 -->
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<!-- 홈 화면/PWA 아이콘: 어두운 배경(타일에 얹히므로 불투명) -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root {
    /* Notion-inspired light palette */
    --bg: #ffffff;
    --surface: #ffffff;
    --surface-2: #f7f6f3;
    --surface-3: #efeeec;
    --border: rgba(55,53,47,0.09);
    --border-strong: rgba(55,53,47,0.16);
    --text: #37352f;
    --muted: rgba(55,53,47,0.55);
    --faint: rgba(55,53,47,0.4);
    --accent: #DF4438;
    --accent-fg: #ffffff;
    --accent-soft: rgba(223,68,56,0.11);
    --high: #e03e3e;
    --med: #d9730d;
    --low: #448361;
    --danger: #e03e3e;
    --hover: rgba(55,53,47,0.055);
    --shadow: 0 1px 3px rgba(15,15,15,0.06), 0 6px 18px rgba(15,15,15,0.07);
    --shadow-menu: rgba(15,15,15,0.05) 0 0 0 1px, rgba(15,15,15,0.08) 0 3px 6px, rgba(15,15,15,0.14) 0 9px 24px;
    --radius: 10px;
    --radius-sm: 6px;
    --memo-bg: #fdea9c;
    --memo-bg-edit: #fbdf74;
    --memo-fg: #3a3016;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  /* Notion-inspired dark palette.
     시스템 다크(수동 라이트로 덮어쓰지 않은 경우) + 수동 다크(data-theme="dark") 공통 */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #191919;
      --surface: #202020;
      --surface-2: #252525;
      --surface-3: #2d2d2d;
      --border: rgba(255,255,255,0.094);
      --border-strong: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.82);
      --muted: rgba(255,255,255,0.46);
      --faint: rgba(255,255,255,0.34);
      --accent: #DF4438;
      --accent-fg: #ffffff;
      --accent-soft: rgba(223,68,56,0.24);
      --high: #ff7369;
      --med: #ffa344;
      --low: #4dab9a;
      --danger: #ff7369;
      --hover: rgba(255,255,255,0.055);
      --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.45);
      --shadow-menu: rgba(15,15,15,0.1) 0 0 0 1px, rgba(15,15,15,0.2) 0 3px 6px, rgba(15,15,15,0.4) 0 9px 24px;
      --memo-bg: #f5d45e;
      --memo-bg-edit: #f8e187;
      --memo-fg: #3a3016;
    }
  }
  :root[data-theme="dark"] {
    --bg: #191919;
    --surface: #202020;
    --surface-2: #252525;
    --surface-3: #2d2d2d;
    --border: rgba(255,255,255,0.094);
    --border-strong: rgba(255,255,255,0.14);
    --text: rgba(255,255,255,0.82);
    --muted: rgba(255,255,255,0.46);
    --faint: rgba(255,255,255,0.34);
    --accent: #DF4438;
    --accent-fg: #ffffff;
    --accent-soft: rgba(223,68,56,0.24);
    --high: #ff7369;
    --med: #ffa344;
    --low: #4dab9a;
    --danger: #ff7369;
    --hover: rgba(255,255,255,0.055);
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.45);
    --shadow-menu: rgba(15,15,15,0.1) 0 0 0 1px, rgba(15,15,15,0.2) 0 3px 6px, rgba(15,15,15,0.4) 0 9px 24px;
    --memo-bg: #f5d45e;
    --memo-bg-edit: #f8e187;
    --memo-fg: #3a3016;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); margin: 0; }
  body {
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Pretendard", "Apple SD Gothic Neo", sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bottom) + 96px);
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 24px;
  }
  .title-row h1 { font-size: 22px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  .title-row h1.brand { display: inline-flex; align-items: center; gap: 9px; }
  .title-row h1.brand span { font-weight: 900; text-transform: lowercase; }
  .brand-logo { width: 32px; height: 32px; flex-shrink: 0; display: block; }
  .meta { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .icon-btn {
    appearance: none; -webkit-appearance: none;
    background: transparent; border: 1px solid transparent; color: var(--muted);
    width: 38px; height: 38px; border-radius: var(--radius-sm);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; transition: all 0.12s;
  }
  .icon-btn:hover { background: var(--hover); color: var(--text); }
  .icon-btn:active { transform: scale(0.96); }
  .icon-btn.sort-active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

  .header-actions { display: inline-flex; gap: 8px; align-items: center; }
  .menu-wrap { position: relative; display: inline-flex; }
  .menu {
    position: absolute; top: 46px; right: 0; z-index: 50;
    min-width: 220px; padding: 6px;
    background: var(--surface);
    border-radius: var(--radius); box-shadow: var(--shadow-menu);
    display: none; flex-direction: column; gap: 1px;
  }
  .menu.show { display: flex; }
  .menu-item {
    appearance: none; -webkit-appearance: none; background: none; border: none;
    color: var(--text); text-align: left; width: 100%;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; gap: 10px; white-space: nowrap;
  }
  .menu-item:hover { background: var(--surface-2); }
  .menu-item:disabled { opacity: 0.4; cursor: default; }
  .menu-item:disabled:hover { background: none; }
  .menu-item.danger { color: var(--danger); }
  .menu-item .mi-ic { width: 18px; text-align: center; font-size: 15px; flex-shrink: 0; }
  .menu-item .mi-count { margin-left: auto; color: var(--accent); font-weight: 700; font-variant-numeric: tabular-nums; }
  .menu-sep { height: 1px; background: var(--border); margin: 4px 6px; }

  .section { margin-bottom: 22px; }
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    color: var(--text); margin: 0 0 8px 0; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px; padding-left: 4px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .section-title .sec-ic { font-size: 14px; line-height: 1; }
  .pri-high .dot { background: var(--high); }
  .pri-med  .dot { background: var(--med); }
  .pri-low  .dot { background: var(--low); }
  .count { color: var(--muted); margin-left: auto; font-weight: 500; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 4px; overflow: hidden;
  }
  .task {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px; border-radius: var(--radius-sm); position: relative; min-height: 44px;
    transition: background 0.1s;
  }
  .task:hover { background: var(--hover); }
  .task input[type="checkbox"] {
    appearance: none; -webkit-appearance: none;
    width: 20px; height: 20px; margin: 1px 0 0 0;
    border: 0; border-radius: 50%;
    background: transparent no-repeat center / contain; cursor: pointer;
    background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='12' cy='12' r='10.5' stroke='%23868686'/%3E%3C/svg%3E");
    flex-shrink: 0; transition: opacity 0.12s; position: relative;
  }
  .task input[type="checkbox"]:hover { opacity: 0.7; }
  .task input[type="checkbox"]:checked {
    background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='12' cy='12' r='11' fill='%23DF4438'/%3E%3Cpath d='M8 11.5L10.9474 15L16 9' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  }
  .task input[type="checkbox"]:checked:hover { opacity: 0.85; }
  /* 체크 순간 뿅! 튀는 마이크로 인터랙션 — 렌더링된 완료 항목이 아닌,
     사용자가 직접 클릭한 순간에만 .pop 클래스로 발동한다. */
  .task input[type="checkbox"].pop {
    animation: cb-pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes cb-pop {
    0% { transform: scale(0.7); }
    55% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .task-toggle {
    flex-shrink: 0; width: 18px; height: 22px; margin-top: 0; padding: 0;
    appearance: none; -webkit-appearance: none; border: 0; background: transparent;
    color: var(--muted); cursor: pointer; font-size: 10px; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px; transition: color 0.12s, background 0.12s;
  }
  .task-toggle:hover { color: var(--text); background: var(--surface-2); }
  .task-toggle.leaf { visibility: hidden; cursor: default; }
  .child-count {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 16px; height: 16px; padding: 0 5px; margin-left: 6px;
    border-radius: 8px; background: var(--surface-2); color: var(--muted);
    font-size: 11px; font-weight: 600; vertical-align: middle;
  }
  .task-text {
    flex: 1; cursor: text; min-width: 0;
    word-break: break-word; padding: 1px 0;
  }
  .task-text:focus { outline: none; }
  .task.done .task-text { color: var(--muted); text-decoration: line-through; }
  .meta-inline { color: var(--muted); font-size: 12px; margin-left: 6px; font-variant-numeric: tabular-nums; }
  .task-actions {
    display: flex; gap: 2px; opacity: 0;
    transition: opacity 0.15s;
  }
  .task:hover .task-actions, .task.menu-open .task-actions { opacity: 1; }
  @media (hover: none) {
    .task-actions { opacity: 1; }
  }
  .row-btn {
    appearance: none; -webkit-appearance: none;
    background: transparent; border: 0; color: var(--muted); cursor: pointer;
    width: 32px; height: 32px; border-radius: 6px; position: relative;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all 0.12s;
  }
  .row-btn:hover { background: var(--surface-2); color: var(--text); }
  .row-btn.danger:hover { background: var(--danger); color: white; }

  .bullet { padding: 4px 10px 4px 40px; color: var(--muted); font-size: 13px; }
  .indent-1 { padding-left: 36px; }
  .indent-2 { padding-left: 60px; }
  .indent-3 { padding-left: 84px; }
  .empty {
    padding: 12px 10px; color: var(--muted); font-size: 13px; font-style: italic;
  }

  /* FAB - Add button */
  .fab {
    position: fixed; right: 20px; bottom: calc(var(--safe-bottom) + 20px);
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent); color: var(--accent-fg);
    border: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 300;
    box-shadow: var(--shadow);
    z-index: 10;
    transition: transform 0.12s;
  }
  .fab[hidden] { display: none; }
  .fab:active { transform: scale(0.94); }

  /* Modal / Bottom sheet */
  .scrim {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s; z-index: 20;
  }
  .scrim.show { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--surface); border-radius: 16px 16px 0 0;
    padding: 20px 20px calc(var(--safe-bottom) + 20px);
    transform: translateY(100%); transition: transform 0.25s ease;
    z-index: 21; max-width: 560px; margin: 0 auto;
  }
  .sheet.show { transform: translateY(0); }
  .sheet h2 { font-size: 17px; margin: 0 0 14px 0; font-weight: 600; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .field input[type="text"], .field input[type="password"], .field textarea {
    width: 100%; padding: 10px 12px; font-size: 15px;
    background: var(--surface-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    font-family: inherit; resize: vertical;
  }
  /* 포커스는 메인 컬러 대신 중립적인 진한 보더로 은은하게 표시 */
  .field input:focus, .field textarea:focus {
    outline: none; border-color: var(--border-strong);
    background: var(--surface);
  }
  .pri-picker { display: flex; gap: 8px; }
  .pri-pill {
    flex: 1; padding: 10px; border-radius: 8px; cursor: pointer;
    background: var(--surface-2); border: 1.5px solid transparent;
    text-align: center; font-size: 14px; font-weight: 500;
    transition: all 0.12s; user-select: none;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .pri-pill:hover { background: var(--hover); }
  .pri-pill.selected { border-color: var(--accent); background: var(--surface); }
  .pri-pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .pri-pill .dot { width: 10px; height: 10px; }

  .actions { display: flex; gap: 8px; margin-top: 16px; }
  .actions .btn { flex: 1; } /* 취소/저장 버튼 가로폭 동일 */
  .btn {
    appearance: none; -webkit-appearance: none;
    padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.12s; border: 1px solid transparent;
    font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-primary:hover { filter: brightness(1.05); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--text); border-color: var(--border); }
  .btn-ghost:hover { background: var(--surface-2); }
  .btn-danger { background: var(--danger); color: white; }

  /* Setup screen */
  .setup {
    max-width: 480px; margin: 80px auto; padding: 24px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  }
  .setup h1 { font-size: 20px; margin: 0 0 6px 0; }
  .setup p { color: var(--muted); font-size: 14px; margin: 0 0 16px 0; line-height: 1.5; }
  .setup ol { font-size: 13px; color: var(--muted); padding-left: 18px; margin: 0 0 16px 0; }
  .setup ol li { margin-bottom: 4px; }
  .setup code {
    background: var(--surface-2); padding: 2px 5px; border-radius: 4px;
    font-size: 12px; font-family: ui-monospace, monospace;
  }
  .setup .err { color: var(--danger); font-size: 13px; margin-top: 8px; }

  /* Toast */
  .toast {
    position: fixed; bottom: calc(var(--safe-bottom) + 90px); left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--text); color: var(--bg);
    padding: 9px 12px 9px 16px; border-radius: 999px; font-size: 13px;
    opacity: 0; transition: opacity 0.18s, transform 0.18s; pointer-events: none;
    z-index: 50; max-width: 90vw;
    display: inline-flex; align-items: center; gap: 12px;
  }
  .toast.show { opacity: 0.94; transform: translateX(-50%) translateY(0); }
  .toast .toast-msg { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .toast .toast-action {
    pointer-events: auto; flex-shrink: 0; cursor: pointer;
    appearance: none; -webkit-appearance: none; border: none;
    background: var(--accent); color: var(--accent-fg);
    font-size: 12px; font-weight: 700; padding: 3px 11px; border-radius: 999px;
  }
  .toast .toast-action:active { transform: scale(0.96); }

  /* Skeleton */
  .skeleton {
    height: 16px; background: linear-gradient(90deg, var(--surface-2), var(--border), var(--surface-2));
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
    border-radius: 4px; margin: 8px 0;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Sync indicator */
  .sync-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted);
    padding: 3px 8px; background: var(--surface-2); border-radius: 999px;
  }
  .sync-pill .dot { background: var(--low); width: 6px; height: 6px; }
  .sync-pill.saving .dot { background: var(--med); animation: pulse 1s infinite; }
  .sync-pill.error .dot { background: var(--danger); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Hover-action UX on mobile: tap to reveal */
  @media (max-width: 600px) {
    .task-actions { opacity: 1; }
    .icon-btn { width: 44px; height: 44px; }
  }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface-2); border-radius: 10px; padding: 3px;
    margin-bottom: 20px;
  }
  .tab {
    flex: 1; appearance: none; -webkit-appearance: none;
    background: transparent; border: 0; color: var(--muted);
    font-family: inherit; font-size: 14px; font-weight: 500;
    padding: 7px 12px; border-radius: 8px; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 0 0 1px var(--border), 0 1px 2px rgba(15,15,15,0.06); }
  .tab:not(.active):hover { color: var(--text); }
  .badge {
    background: var(--accent); color: var(--accent-fg);
    font-size: 11px; font-weight: 700; min-width: 18px; height: 18px;
    border-radius: 999px; padding: 0 5px;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* Inbox */
  .inbox-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px; border-radius: 8px; min-height: 44px;
    transition: background 0.12s; cursor: pointer;
  }
  .inbox-item:hover { background: var(--hover); }
  .inbox-item.selected { background: var(--accent-soft); }
  .inbox-cb {
    appearance: none; -webkit-appearance: none;
    width: 20px; height: 20px; flex-shrink: 0; margin: 0;
    border: 1.5px solid var(--border-strong); border-radius: 4px;
    background: transparent; cursor: pointer;
    transition: all 0.12s; position: relative;
  }
  .inbox-cb:checked { background: var(--accent); border-color: var(--accent); }
  .inbox-cb:checked::after {
    content: ""; position: absolute; left: 5px; top: 1px;
    width: 5px; height: 10px;
    border: solid var(--accent-fg); border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .inbox-text { flex: 1; word-break: break-word; font-size: 15px; }
  .inbox-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .pri-mini {
    appearance: none; -webkit-appearance: none;
    border: 1.5px solid var(--border); background: var(--surface-2); color: var(--muted);
    font-size: 11px; font-weight: 700; width: 32px; height: 32px; border-radius: 6px;
    cursor: pointer; transition: all 0.12s; position: relative;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .pri-mini:hover { border-color: var(--accent); color: var(--text); background: var(--surface); }
  .pri-mini.h:hover { border-color: var(--high); }
  .pri-mini.m:hover { border-color: var(--med); }
  .pri-mini.l:hover { border-color: var(--low); }

  /* 터치 타깃 확대 — 시각 크기는 유지하고 히트 영역을 최소 44px 높이로 넓힌다.
     행이 세로로 쌓이므로 세로 확장은 인접 버튼과 겹치지 않아 안전하다. */
  @media (pointer: coarse) {
    .task-toggle { position: relative; }
    .row-btn::before, .pri-mini::before, .task-toggle::before,
    .inbox-cb::before, .task input[type="checkbox"]::before {
      content: ""; position: absolute; top: 50%; left: 50%;
      width: 100%; min-width: 32px; height: 44px;
      transform: translate(-50%, -50%);
    }
  }

  /* Bulk action bar */
  .inbox-bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 10px 16px calc(var(--safe-bottom) + 10px);
    display: flex; align-items: center; gap: 6px;
    z-index: 10; transform: translateY(100%); transition: transform 0.22s ease;
    max-width: 720px; margin: 0 auto;
  }
  .inbox-bar.show { transform: translateY(0); }
  .inbox-bar-label { font-size: 13px; color: var(--muted); flex: 1; white-space: nowrap; }
  .bar-btn {
    appearance: none; -webkit-appearance: none;
    border: 1.5px solid var(--border); background: var(--surface-2); color: var(--text);
    font-size: 12px; font-weight: 700; padding: 7px 12px; border-radius: 8px;
    cursor: pointer; transition: all 0.12s; font-family: inherit; white-space: nowrap;
  }
  .bar-btn.h:hover { border-color: var(--high); color: var(--high); }
  .bar-btn.m:hover { border-color: var(--med); color: var(--med); }
  .bar-btn.l:hover { border-color: var(--low); color: var(--low); }
  .bar-btn.danger { border-color: transparent; }
  .bar-btn.danger:hover { background: var(--danger); border-color: var(--danger); color: white; }
  .bar-btn.ghost { background: transparent; border-color: transparent; color: var(--muted); font-weight: 400; }
  .bar-btn.ghost:hover { background: var(--surface-2); color: var(--text); }

  /* Drag & drop */
  .drag-handle {
    cursor: grab; touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-size: 16px; line-height: 1;
  }
  .drag-handle:active { cursor: grabbing; }
  .task.dragging { opacity: 0.3; }
  .drag-ghost {
    position: fixed; pointer-events: none; z-index: 100;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    opacity: 0.92; transition: none;
  }
  .drop-indicator {
    height: 2px; background: var(--accent);
    margin: 0 8px; border-radius: 1px;
    pointer-events: none;
  }
  .section.drop-active .card {
    background: color-mix(in srgb, var(--accent) 5%, var(--surface));
  }
  .task.drop-into {
    background: color-mix(in srgb, var(--accent) 14%, var(--surface));
    outline: 2px dashed var(--accent);
    outline-offset: -2px;
    border-radius: 8px;
  }

  /* Archive */
  .archive-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; flex-shrink: 0;
    font-size: 13px; line-height: 1;
  }

  /* Memo board (masonry / column-based) */
  .memo-board {
    --cols: 3;
    --gap: 10px;
    display: grid;
    grid-template-columns: repeat(var(--cols), 1fr);
    gap: var(--gap);
    min-height: 200px;
  }
  .memo-col {
    display: flex;
    flex-direction: column;
    gap: var(--gap);
    min-height: 60px;
  }
  .memo {
    background: var(--memo-bg);
    color: var(--memo-fg);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px; line-height: 1.5;
    box-shadow: 0 1px 2px rgba(15,15,15,0.06), 0 2px 8px rgba(15,15,15,0.05);
    cursor: grab;
    word-break: break-word;
    white-space: pre-wrap;
    position: relative;
    transition: box-shadow 0.12s;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
    min-height: 56px;
  }
  .memo:hover { box-shadow: 0 2px 6px rgba(0,0,0,0.18), 0 8px 16px rgba(0,0,0,0.1); }
  .memo.dragging { opacity: 0.3; }
  .memo.editing {
    cursor: text; user-select: text; -webkit-user-select: text;
    outline: 2px solid var(--accent); outline-offset: 1px;
    background: var(--memo-bg-edit);
  }
  .memo .memo-text {
    min-height: 36px;
    outline: none;
  }
  .memo .memo-del {
    position: absolute; top: 2px; right: 2px;
    width: 20px; height: 20px; border-radius: 50%;
    border: 0; background: color-mix(in srgb, var(--memo-fg) 12%, transparent); color: var(--memo-fg);
    font-size: 13px; line-height: 1; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    padding: 0;
  }
  .memo:hover .memo-del { display: inline-flex; }
  @media (hover: none) { .memo .memo-del { display: inline-flex; } }
  .memo-ghost {
    position: fixed; pointer-events: none; z-index: 100;
    background: var(--memo-bg); color: var(--memo-fg);
    border-radius: var(--radius-sm); padding: 10px 12px;
    font-size: 13px; line-height: 1.5;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    opacity: 0.92;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .memo-drop-placeholder {
    background: color-mix(in srgb, var(--accent) 16%, transparent);
    border: 2px dashed var(--accent);
    border-radius: 4px;
    height: 56px;
    pointer-events: none;
  }
  @media (max-width: 600px) {
    .memo-board { --cols: 2; }
  }
</style>
<script>
  // 저장된 테마를 렌더 전에 적용(깜빡임 방지). 'light' | 'dark' | 없음(시스템)
  (function () {

<script>
'use strict';

// ============ Config ============
const OWNER = 'minsootask-web';
const REPO  = 'tasks-data';
const FILE  = 'active.md';
const INBOX_FILE = 'inbox.md';
const ARCHIVE_FILE = 'archive.json';
const MEMOS_FILE = 'memos.json';
const API   = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
const INBOX_API = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${INBOX_FILE}`;
const ARCHIVE_API = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${ARCHIVE_FILE}`;
const MEMOS_API = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${MEMOS_FILE}`;
const SECTION_KEYS = { high: '🔥 High', medium: '🟡 Medium', low: '🟢 Low' };
function getMemoCols() { return window.innerWidth <= 600 ? 2 : 3; }
const MEMO_MAX_COLS = 3;

// ============ State ============
const state = {
  token: localStorage.getItem('gh_pat') || null,
  content: '',
  sha: '',
  sections: [],
  saving: false,
  inboxContent: '',
  inboxSha: '',
  inboxItems: [],
  archiveContent: '',
  archiveSha: '',
  archiveItems: [],
  memosSha: '',
  memos: [],
};

let currentTab = 'active';
let selectedInbox = new Set();
let selectedArchive = new Set();
let sheetMode = 'add'; // 'add' | 'edit'
let editingLine = -1;
let editingIsSub = false; // 편집 대상이 하위 할 일인지
let sortIncompleteFirst = false;

// 하위 항목 접기 상태 — 부모 할 일의 텍스트를 키로 저장(재정렬·재조회에도 유지)
const COLLAPSE_KEY = 'tasks_collapsed';
let collapsedSet = new Set(JSON.parse(localStorage.getItem(COLLAPSE_KEY) || '[]'));
function collapseKeyOf(item) { return item.text.trim(); }
function isCollapsed(item) { return collapsedSet.has(collapseKeyOf(item)); }
function toggleCollapse(item) {
  const k = collapseKeyOf(item);
  if (collapsedSet.has(k)) collapsedSet.delete(k); else collapsedSet.add(k);
  localStorage.setItem(COLLAPSE_KEY, JSON.stringify([...collapsedSet]));
  renderApp();
}

// ============ Theme (light/dark toggle) ============
const THEME_KEY = 'tasks_theme';
// 현재 실제 적용 중인 테마('light'|'dark') — 수동 지정이 있으면 그 값, 없으면 시스템 설정
function effectiveTheme() {
  const t = document.documentElement.getAttribute('data-theme');
  if (t === 'light' || t === 'dark') return t;
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function applyTheme(mode) { // 'light' | 'dark' | 'system'
  const root = document.documentElement;
  if (mode === 'light' || mode === 'dark') {
    root.setAttribute('data-theme', mode);
    try { localStorage.setItem(THEME_KEY, mode); } catch (e) {}
  } else {
    root.removeAttribute('data-theme');
    try { localStorage.removeItem(THEME_KEY); } catch (e) {}
  }
  updateThemeColorMeta();
}
function toggleTheme() {
  applyTheme(effectiveTheme() === 'dark' ? 'light' : 'dark');
}
// 수동 지정 시 모바일 브라우저 상단바 색을 실제 테마에 맞춘다(미지정이면 media 메타에 위임)
function updateThemeColorMeta() {
  const forced = document.documentElement.getAttribute('data-theme');
  let m = document.querySelector('meta#theme-color-dynamic');
  if (!forced) { if (m) m.remove(); return; }
  if (!m) {
    m = document.createElement('meta');
    m.id = 'theme-color-dynamic';
    m.setAttribute('name', 'theme-color');
    document.head.appendChild(m);
  }
  m.setAttribute('content', forced === 'dark' ? '#191919' : '#ffffff');
}

let toastTimer;
function toast(msg, ms = 1400, action = null) {
  const t = $('#toast');
  t.innerHTML = '';
  const span = document.createElement('span');
  span.className = 'toast-msg';
  span.textContent = msg;
  t.appendChild(span);
  if (action && action.label && typeof action.onClick === 'function') {
    const btn = document.createElement('button');
    btn.className = 'toast-action';
    btn.type = 'button';
    btn.textContent = action.label;
    let fired = false;
    btn.addEventListener('click', () => {
      if (fired) return;
      fired = true;
      clearTimeout(toastTimer);
      t.classList.remove('show');
      action.onClick();
    });
    t.appendChild(btn);
  }
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}

// utf-8 safe base64
function utf8ToBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin);
}
function base64ToUtf8(b64) {
  const bin = atob(b64.replace(/\s/g, ''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

// ============ GitHub API ============
async function ghLoadInbox() {
  const res = await fetch(INBOX_API, {
    headers: { Authorization: `Bearer ${state.token}`, Accept: 'application/vnd.github+json' },
    cache: 'no-cache',
  });
  if (!res.ok) return;
  const data = await res.json();
  state.inboxSha = data.sha;
  state.inboxContent = base64ToUtf8(data.content);
  state.inboxItems = parseInbox(state.inboxContent);
}

async function ghLoadArchive() {
  const res = await fetch(ARCHIVE_API, {
    headers: { Authorization: `Bearer ${state.token}`, Accept: 'application/vnd.github+json' },
    cache: 'no-cache',
  });
  if (res.status === 404) {
    await ghCreateArchive();
    return ghLoadArchive();
  }
  if (!res.ok) return;
  const data = await res.json();
  state.archiveSha = data.sha;
  state.archiveContent = base64ToUtf8(data.content);
  try { state.archiveItems = JSON.parse(state.archiveContent) || []; }
  catch { state.archiveItems = []; }
}

async function ghCreateArchive() {
  const res = await fetch(ARCHIVE_API, {
    method: 'PUT',
    headers: {
      Authorization: `Bearer ${state.token}`,
      Accept: 'application/vnd.github+json',
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ message: 'init: archive', content: utf8ToBase64('[]\n') }),
  });
  if (!res.ok) throw new Error(`create archive ${res.status}`);
}

async function ghSaveArchive(newItems, message) {
  const content = JSON.stringify(newItems, null, 2) + '\n';
  const res = await fetch(ARCHIVE_API, {
    method: 'PUT',
    headers: {
      Authorization: `Bearer ${state.token}`,
      Accept: 'application/vnd.github+json',
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ message, content: utf8ToBase64(content), sha: state.archiveSha }),
  });
  if (!res.ok) throw new Error(`PUT archive ${res.status}`);
  const data = await res.json();
  state.archiveSha = data.content.sha;
  state.archiveContent = content;
  state.archiveItems = newItems;
}

async function ghLoad() {
  const res = await fetch(API, {
    headers: { Authorization: `Bearer ${state.token}`, Accept: 'application/vnd.github+json' },
    cache: 'no-cache',
  });
  if (!res.ok) {
    if (res.status === 401) throw Object.assign(new Error('unauthorized'), { code: 401 });
    if (res.status === 404) throw Object.assign(new Error('not-found'), { code: 404 });
    throw new Error(`HTTP ${res.status}`);
  }
  const data = await res.json();
  state.sha = data.sha;
  state.content = base64ToUtf8(data.content);
  state.sections = parseSections(state.content);
}

async function ghSave(newContent, message, opts = {}) {
  state.saving = true;
  renderSync();
  try {
    let attempt = 0;
    let mutated = newContent;
    while (true) {
      const res = await fetch(API, {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${state.token}`,
          Accept: 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ message, content: utf8ToBase64(mutated), sha: state.sha }),
      });
      if (res.ok) {
        const data = await res.json();
        state.sha = data.content.sha;
        // keepLocalState: 낙관적 업데이트로 state.content가 이미 더 최신일 수 있으므로
        // 저장한 스냅샷으로 되돌리지 않는다 (sha만 갱신).
        if (!opts.keepLocalState) {
          state.content = mutated;
          state.sections = parseSections(state.content);
        }
        state.saving = false;
        renderSync();
        return;
      }
      // 409 = sha conflict → refetch and bail (caller should retry mutation)
      if (res.status === 409 && attempt === 0) {
        attempt++;
        await ghLoad();
        throw Object.assign(new Error('conflict'), { code: 409 });
      }
      throw new Error(`PUT ${res.status}`);
    }
  } catch (e) {
    state.saving = false;
    renderSync(true);
    throw e;
  }
}

// ============ Parsing / Mutation ============
function parseInbox(text) {
  return text.split('\n')
    .map((line, idx) => ({ line, idx }))
    .filter(({ line }) => line.match(/^-\s+\S/))
    .map(({ line, idx }) => ({ text: line.replace(/^-\s+/, '').trim(), lineIdx: idx }));
}

function removeInboxLine(lineIdx) {
  const lines = state.inboxContent.split('\n');
  lines.splice(lineIdx, 1);
  return lines.join('\n');
}

function removeInboxLines(lineIdxs) {
  const lines = state.inboxContent.split('\n');
  [...lineIdxs].sort((a, b) => b - a).forEach((idx) => lines.splice(idx, 1));
  return lines.join('\n');
}

function parseSections(text) {
  const lines = text.split('\n');
  const sections = [];
  let cur = null;
  lines.forEach((line, idx) => {
    const hd = line.match(/^##\s+(.+)$/);
    if (hd) {
      cur = { title: hd[1].trim(), items: [], headerLine: idx };
      sections.push(cur);
      return;
    }
    if (!cur) return;
    const cb = line.match(/^(\s*)- \[([ xX])\] (.*)$/);
    if (cb) {
      cur.items.push({
        type: 'task',
        indent: Math.floor(cb[1].length / 2),
        checked: cb[2].toLowerCase() === 'x',
        text: cb[3],
        lineIndex: idx,
      });
      return;
    }
    const bl = line.match(/^(\s*)- (.+)$/);
    if (bl && bl[2].trim() !== '') {
      cur.items.push({
        type: 'bullet',
        indent: Math.floor(bl[1].length / 2),
        text: bl[2],
        lineIndex: idx,
      });
    }
  });
  return sections;
}

function findSectionByKey(key) {
  const want = SECTION_KEYS[key];
  return state.sections.find((s) => s.title === want);
}

function toggleAt(lineIndex, checked) {
  const lines = state.content.split('\n');
  const line = lines[lineIndex];
  lines[lineIndex] = checked
    ? line.replace('- [ ]', '- [x]')
    : line.replace('- [x]', '- [ ]');
  return lines.join('\n');
}

function appendToSection(key, text) {
  const lines = state.content.split('\n');
  const want = SECTION_KEYS[key];
  const headerIdx = lines.findIndex((l) => l.match(/^##\s+(.+)$/)?.[1]?.trim() === want);
  if (headerIdx === -1) throw new Error('section not found: ' + key);
  // Find insertion point: after last non-empty line within this section
  let insertAfter = headerIdx;
  for (let i = headerIdx + 1; i < lines.length; i++) {
    if (lines[i].startsWith('## ')) break;
    if (lines[i].trim() !== '') insertAfter = i;
  }
  // If last line of section is just "- " placeholder, replace it
  if (lines[insertAfter].trim() === '-' || lines[insertAfter].trim() === '- ') {
    lines[insertAfter] = `- [ ] ${text}`;
  } else {
    lines.splice(insertAfter + 1, 0, `- [ ] ${text}`);
  }
  return lines.join('\n');
}

function editLine(lineIndex, newText) {
  const lines = state.content.split('\n');
  const line = lines[lineIndex];
  const m = line.match(/^(\s*- \[[ xX]\] )(.*)$/);
  if (!m) throw new Error('not a task line');
  lines[lineIndex] = m[1] + newText;
  return lines.join('\n');
}

function deleteAt(lineIndex) {
  const lines = state.content.split('\n');
  const base = lines[lineIndex];
  const baseIndent = (base.match(/^(\s*)/)?.[0] || '').length;
  let removeUntil = lineIndex;
  for (let i = lineIndex + 1; i < lines.length; i++) {
    if (lines[i].startsWith('## ')) break;
    const ind = (lines[i].match(/^(\s*)/)?.[0] || '').length;
    if (lines[i].trim() === '') continue;
    if (ind > baseIndent) removeUntil = i;
    else break;
  }
  lines.splice(lineIndex, removeUntil - lineIndex + 1);
  return lines.join('\n');
}

function extractBlock(lines, lineIndex) {
  const baseIndent = (lines[lineIndex].match(/^(\s*)/)?.[0] || '').length;
  let endIdx = lineIndex;
  for (let i = lineIndex + 1; i < lines.length; i++) {
    if (lines[i].startsWith('## ')) break;
    const ind = (lines[i].match(/^(\s*)/)?.[0] || '').length;
    if (lines[i].trim() === '') continue;
    if (ind > baseIndent) endIdx = i;
    else break;
  }
  return { start: lineIndex, end: endIdx };
}

function getLineIndent(line) {
  const m = line.match(/^(\s*)/);
  return Math.floor((m?.[0]?.length || 0) / 2);
}

function adjustBlockIndent(block, deltaIndent) {
  if (deltaIndent === 0) return block;
  return block.map((line) => {
    if (line.trim() === '') return line;
    const m = line.match(/^(\s*)(.*)$/);
    const curIndent = Math.floor(m[1].length / 2);
    const newIndent = Math.max(0, curIndent + deltaIndent);
    return '  '.repeat(newIndent) + m[2];
  });
}

function moveLineToSection(lineIndex, targetKey) {
  const lines = state.content.split('\n');
  const { start, end } = extractBlock(lines, lineIndex);
  const block = lines.splice(start, end - start + 1);
  const want = SECTION_KEYS[targetKey];
  const headerIdx = lines.findIndex((l) => l.match(/^##\s+(.+)$/)?.[1]?.trim() === want);
  if (headerIdx === -1) throw new Error('target section not found');
  let insertAfter = headerIdx;
  for (let i = headerIdx + 1; i < lines.length; i++) {
    if (lines[i].startsWith('## ')) break;
    if (lines[i].trim() !== '') insertAfter = i;
  }
  if (lines[insertAfter].trim() === '-' || lines[insertAfter].trim() === '- ') {
    lines.splice(insertAfter, 1, ...block);
  } else {
    lines.splice(insertAfter + 1, 0, ...block);
  }
  return lines.join('\n');
}

// Move a task block.
// target: { sectionKey, beforeLine?, intoLine?, indent? }
//   - beforeLine: insert before this line at the target line's indent (sibling)
//   - intoLine: insert as the last child of this line (indent = target + 1)
//   - neither: append at end of section as a main task (indent 0)
//   - indent: optional explicit depth override (used for the depth-ambiguous gap below a
//     last child, where the next line's indent alone can't express "stay as the last child")
function moveLineToPosition(srcLineIndex, target) {
  const lines = state.content.split('\n');
  const { start, end } = extractBlock(lines, srcLineIndex);
  const blockLen = end - start + 1;

  if (target.beforeLine != null && target.beforeLine > start && target.beforeLine <= end) {
    throw new Error('invalid drop: before-target is inside source block');
  }
  if (target.intoLine != null && target.intoLine >= start && target.intoLine <= end) {
    throw new Error('invalid drop: cannot make self/descendant into a child');
  }

  const srcBaseIndent = getLineIndent(lines[start]);
  let block = lines.splice(start, blockLen);

  let targetIndent;
  if (target.intoLine != null) {
    let intoIdx = target.intoLine;
    if (intoIdx > start) intoIdx -= blockLen;
    targetIndent = getLineIndent(lines[intoIdx]) + 1;
  } else if (target.beforeLine != null) {
    let beforeIdx = target.beforeLine;
    if (beforeIdx > start) beforeIdx -= blockLen;
    targetIndent = getLineIndent(lines[beforeIdx]);
  } else {
    targetIndent = 0;
  }
  if (target.indent != null && target.intoLine == null) targetIndent = target.indent;
  block = adjustBlockIndent(block, targetIndent - srcBaseIndent);

  if (target.intoLine != null) {
    let parentIdx = target.intoLine;
    if (parentIdx > start) parentIdx -= blockLen;
    const parentIndent = getLineIndent(lines[parentIdx]);
    let insertAt = parentIdx + 1;
    while (insertAt < lines.length) {
      const l = lines[insertAt];
      if (l.startsWith('## ')) break;
      if (l.trim() === '') { insertAt++; continue; }
      if (getLineIndent(l) <= parentIndent) break;
      insertAt++;
    }
    lines.splice(insertAt, 0, ...block);
    return lines.join('\n');
  }

  if (target.beforeLine != null) {
    let insertAt = target.beforeLine;
    if (insertAt > start) insertAt -= blockLen;
    lines.splice(insertAt, 0, ...block);
    return lines.join('\n');
  }

  const want = SECTION_KEYS[target.sectionKey];
  const headerIdx = lines.findIndex((l) => l.match(/^##\s+(.+)$/)?.[1]?.trim() === want);
  if (headerIdx === -1) throw new Error('target section not found');
  let insertAfter = headerIdx;
  for (let i = headerIdx + 1; i < lines.length; i++) {
    if (lines[i].startsWith('## ')) break;
    if (lines[i].trim() !== '') insertAfter = i;
  }
  if (lines[insertAfter].trim() === '-' || lines[insertAfter].trim() === '- ') {
    lines.splice(insertAfter, 1, ...block);
  } else {
    lines.splice(insertAfter + 1, 0, ...block);
  }
  return lines.join('\n');
}

async function onBulkRestore() {
  const ids = [...selectedArchive];
  const entries = state.archiveItems.filter((i) => selectedArchive.has(i.id));
  if (!entries.length) return;
  try {
    const activeEntries = entries.filter((e) => e.source === 'active');
    if (activeEntries.length) {
      await ghLoad();
      const lines = state.content.split('\n');
      activeEntries.forEach((entry) => {
        const want = SECTION_KEYS[entry.priority];
        const headerIdx = lines.findIndex((l) => l.match(/^##\s+(.+)$/)?.[1]?.trim() === want);
        if (headerIdx === -1) return;
        let insertAfter = headerIdx;
        for (let i = headerIdx + 1; i < lines.length; i++) {
          if (lines[i].startsWith('## ')) break;
          if (lines[i].trim() !== '') insertAfter = i;
        }
        const block = entry.block || [];
        if (lines[insertAfter].trim() === '-' || lines[insertAfter].trim() === '- ') {
          lines.splice(insertAfter, 1, ...block);
        } else {
          lines.splice(insertAfter + 1, 0, ...block);
        }
      });
      await ghSave(lines.join('\n'), `restore ${activeEntries.length} from archive`);
    }

    const inboxEntries = entries.filter((e) => e.source === 'inbox');
    if (inboxEntries.length) {
      await ghLoadInbox();
      let c = state.inboxContent;
      if (c && !c.endsWith('\n')) c += '\n';
      inboxEntries.forEach((e) => { c += `- ${e.text}\n`; });
      await ghSaveInbox(c, `restore ${inboxEntries.length} from archive`);
    }

    await ghLoadArchive();
    await ghSaveArchive(state.archiveItems.filter((i) => !ids.includes(i.id)), `restore done: ${ids.length}`);
    selectedArchive.clear();
    toast(`${ids.length}개 복구됨`);
    renderArchive();
  } catch (e) { toast(`실패: ${e.message}`); }
}

async function onBulkPurge() {
  const ids = [...selectedArchive];

function genArchiveId() {
  return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
}

async function archiveActiveTask(item) {
  const lines = state.content.split('\n');
  const { start, end } = extractBlock(lines, item.lineIndex);
  const block = lines.slice(start, end + 1);
  const sec = state.sections.find((s) => s.items.some((i) => i.lineIndex === item.lineIndex));
  const priority = Object.keys(SECTION_KEYS).find((k) => SECTION_KEYS[k] === sec?.title) || 'medium';
  const entry = {
    id: genArchiveId(),
    deletedAt: new Date().toISOString(),
    source: 'active',
    priority,
    block,
  };
  await ghLoadArchive();
  await ghSaveArchive([...state.archiveItems, entry], `archive: ${item.text}`);
  await ghSave(deleteAt(item.lineIndex), `archive (from active): ${item.text}`);
}

  const entry = {

    deletedAt: new Date().toISOString(),
    source: 'inbox',
    text: item.text,
  };

async function onRestore(entry) {
  try {
    if (entry.source === 'active') {
      await ghLoad();
      const lines = state.content.split('\n');
      const want = SECTION_KEYS[entry.priority];
      const headerIdx = lines.findIndex((l) => l.match(/^##\s+(.+)$/)?.[1]?.trim() === want);
      if (headerIdx === -1) throw new Error('section not found');
      let insertAfter = headerIdx;
      for (let i = headerIdx + 1; i < lines.length; i++) {
        if (lines[i].startsWith('## ')) break;
        if (lines[i].trim() !== '') insertAfter = i;
      }
      const block = entry.block;
      if (lines[insertAfter].trim() === '-' || lines[insertAfter].trim() === '- ') {
        lines.splice(insertAfter, 1, ...block);
      } else {
        lines.splice(insertAfter + 1, 0, ...block);
      }
      await ghSave(lines.join('\n'), `restore: ${block[0]}`);
    } else if (entry.source === 'inbox') {
      await ghLoadInbox();
      let c = state.inboxContent;
      if (c && !c.endsWith('\n')) c += '\n';
      c += `- ${entry.text}\n`;
      await ghSaveInbox(c, `restore: ${entry.text}`);
    }
    await ghLoadArchive();
    await ghSaveArchive(state.archiveItems.filter((i) => i.id !== entry.id), `restore done`);
    toast('복구됨');
    renderArchive();
  } catch (e) { toast(`실패: ${e.message}`); }
}

async function onPurge(entry) {

function memoCol(m) {
  // Backward-compat: { x, y } → { col, order }
  if (m.col != null) return m.col;
  if (m.x != null) return m.x;
  return 0;
}
function memoOrder(m) {
  if (m.order != null) return m.order;
  if (m.y != null) return m.y;
  return 0;
}

function drawMemos() {
  const board = $('#memo-board');
  if (!board) return;
  const cols = getMemoCols();
  board.style.setProperty('--cols', cols);
  board.innerHTML = '';

  const grouped = Array.from({ length: cols }, () => []);
  state.memos.forEach((m) => {
    const c = Math.min(cols - 1, Math.max(0, memoCol(m)));
    grouped[c].push(m);
  });
  grouped.forEach((arr) => arr.sort((a, b) => memoOrder(a) - memoOrder(b)));

  grouped.forEach((arr, c) => {
    const col = document.createElement('div');
    col.className = 'memo-col';
    col.dataset.col = c;
    arr.forEach((m) => col.appendChild(renderMemoEl(m)));
    board.appendChild(col);
  });
}

function renderMemoEl(m) {
  const div = document.createElement('div');
  div.className = 'memo';
  div.dataset.id = m.id;

  const textEl = document.createElement('div');
  textEl.className = 'memo-text';
  textEl.textContent = m.text || '';
  div.appendChild(textEl);

  const del = document.createElement('button');
  del.className = 'memo-del';
  del.innerHTML = '×';
  del.title = '삭제';
  del.addEventListener('pointerdown', (e) => e.stopPropagation());
  del.addEventListener('click', (e) => { e.stopPropagation(); onDeleteMemo(m.id); });
  div.appendChild(del);

  div.addEventListener('pointerdown', (e) => onMemoPointerDown(e, m, div));
  return div;
}

function onMemoPointerDown(e, m, div) {
  if (div.classList.contains('editing')) return;
  if (e.target.closest('.memo-del')) return;
  if (e.button != null && e.button !== 0) return;

  const startX = e.clientX, startY = e.clientY;
  let started = false;

  const onMove = (e2) => {
    if (started) return;
    if (Math.hypot(e2.clientX - startX, e2.clientY - startY) > 5) {
      started = true;
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      startMemoDrag(e2, m, div);
    }
  };
  const onUp = () => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    if (!started) startEditMemo(div, m);
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

const memoDragCtx = {};

function startMemoDrag(e, m, div) {
  const divRect = div.getBoundingClientRect();

  const ghost = div.cloneNode(true);
  ghost.classList.add('memo-ghost');
  ghost.classList.remove('dragging');
  ghost.style.left = divRect.left + 'px';
  ghost.style.top = divRect.top + 'px';
  ghost.style.width = divRect.width + 'px';
  document.body.appendChild(ghost);

  const placeholder = document.createElement('div');
  placeholder.className = 'memo-drop-placeholder';

  Object.assign(memoDragCtx, {
    div, m, ghost, placeholder,
    offsetX: e.clientX - divRect.left,
    offsetY: e.clientY - divRect.top,
    targetCol: memoCol(m),
    targetIdx: -1,
  });
  div.classList.add('dragging');
  document.addEventListener('pointermove', onMemoDragMove);
  document.addEventListener('pointerup', onMemoDragEnd);
  document.addEventListener('pointercancel', onMemoDragEnd);
}

function onMemoDragMove(e) {
  const { ghost, placeholder, offsetX, offsetY, div } = memoDragCtx;
  ghost.style.left = (e.clientX - offsetX) + 'px';
  ghost.style.top = (e.clientY - offsetY) + 'px';

  const board = $('#memo-board');
  if (!board) return;
  const colsEls = [...board.querySelectorAll('.memo-col')];
  if (!colsEls.length) return;

  // Find which column horizontally
  let targetCol = colsEls.find((c) => {
    const r = c.getBoundingClientRect();
    return e.clientX >= r.left && e.clientX <= r.right;
  });
  if (!targetCol) {
    const first = colsEls[0].getBoundingClientRect();
    const last = colsEls[colsEls.length - 1].getBoundingClientRect();
    targetCol = e.clientX < first.left ? colsEls[0] : colsEls[colsEls.length - 1];
  }

  // Find insertion index within the column (excluding dragged + existing placeholder)
  const siblings = [...targetCol.children].filter((el) => el !== div && el !== placeholder);
  let insertIdx = siblings.length;
  for (let i = 0; i < siblings.length; i++) {
    const r = siblings[i].getBoundingClientRect();
    if (e.clientY < r.top + r.height / 2) { insertIdx = i; break; }
  }

  // Place placeholder
  if (placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
  if (insertIdx >= siblings.length) targetCol.appendChild(placeholder);
  else targetCol.insertBefore(placeholder, siblings[insertIdx]);

  memoDragCtx.targetCol = +targetCol.dataset.col;
  memoDragCtx.targetIdx = insertIdx;
}

async function onMemoDragEnd() {
  document.removeEventListener('pointermove', onMemoDragMove);
  document.removeEventListener('pointerup', onMemoDragEnd);
  document.removeEventListener('pointercancel', onMemoDragEnd);

  const { div, m, ghost, placeholder, targetCol, targetIdx } = memoDragCtx;
  ghost?.remove();
  placeholder?.remove();
  div?.classList.remove('dragging');

  if (targetIdx < 0) return;

  const cols = getMemoCols();
  const grouped = Array.from({ length: cols }, () => []);
  state.memos.forEach((x) => {
    if (x.id === m.id) return;
    const c = Math.min(cols - 1, Math.max(0, memoCol(x)));
    grouped[c].push(x);
  });
  grouped.forEach((arr) => arr.sort((a, b) => memoOrder(a) - memoOrder(b)));
  grouped[targetCol].splice(targetIdx, 0, m);

  const newMemos = [];
  grouped.forEach((arr, c) => {
    arr.forEach((x, i) => {
      const updated = { ...x, col: c, order: i };
      delete updated.x; delete updated.y;
      newMemos.push(updated);
    });
  });

  if (sameMemos(newMemos, state.memos)) return;

  try {
    await ghSaveMemos(newMemos, `memo: move`);
    drawMemos();
  } catch (e) { toast(`실패: ${e.message}`); drawMemos(); }
}

function sameMemos(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) {
    const x = a[i], y = b.find((q) => q.id === x.id);
    if (!y) return false;
    if ((y.col ?? y.x ?? 0) !== x.col) return false;
    if ((y.order ?? y.y ?? 0) !== x.order) return false;
  }
  return true;
}

function startEditMemo(div, m) {
  if (div.classList.contains('editing')) return;
  const textEl = div.querySelector('.memo-text');
  if (!textEl) return;
  div.classList.add('editing');
  textEl.setAttribute('contenteditable', 'plaintext-only');
  textEl.focus();
  const range = document.createRange();
  range.selectNodeContents(textEl);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  let committing = false;
  const finish = async (commit) => {
    if (committing) return;
    committing = true;
    textEl.removeEventListener('blur', onBlur);
    textEl.removeEventListener('keydown', onKey);
    textEl.removeAttribute('contenteditable');
    div.classList.remove('editing');
    const newText = textEl.textContent.trim();
    if (!commit) { textEl.textContent = m.text || ''; return; }
    if (newText === (m.text || '')) return;
    const newMemos = state.memos.map((x) => x.id === m.id ? { ...x, text: newText } : x);
    try { await ghSaveMemos(newMemos, `memo: edit`); }
    catch (e) { toast(`실패: ${e.message}`); textEl.textContent = m.text || ''; }
  };
  const onBlur = () => finish(true);
  const onKey = (e) => {
    if (e.key === 'Escape') { e.preventDefault(); finish(false); textEl.blur(); }
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); textEl.blur(); }
  };
  textEl.addEventListener('blur', onBlur);
  textEl.addEventListener('keydown', onKey);
}

async function onAddMemo() {
  // Insert at top of shortest column
  const cols = getMemoCols();
  const counts = Array.from({ length: cols }, () => 0);
  state.memos.forEach((m) => {
    const c = Math.min(cols - 1, Math.max(0, memoCol(m)));
    counts[c]++;
  });
  let targetCol = 0;
  for (let i = 1; i < cols; i++) if (counts[i] < counts[targetCol]) targetCol = i;

  // Shift others in target column down by 1
  const newMemos = state.memos.map((m) => {
    if (Math.min(cols - 1, Math.max(0, memoCol(m))) === targetCol) {
      return { ...m, col: targetCol, order: memoOrder(m) + 1, x: undefined, y: undefined };
    }
    return m;
  });
  const newMemo = {
    id: Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 6),
    text: '',
    col: targetCol,
    order: 0,
  };
  try {
    await ghSaveMemos([newMemo, ...newMemos], 'memo: add');
    drawMemos();
    const el = document.querySelector(`.memo[data-id="${newMemo.id}"]`);
    if (el) startEditMemo(el, newMemo);
  } catch (e) { toast(`실패: ${e.message}`); }
}

// ============ Sort ============
function sortItemsIncompleteFirst(items) {
  // Group items into blocks: each top-level task + its indented descendants
  const blocks = [];
  let cur = null;
  for (const item of items) {
    // Start a new block on a top-level item, OR on any leading/orphaned indented
    // item that has no parent block yet — otherwise it would be silently dropped
    // (the cause of items vanishing when a section starts with an indented line).
    if (item.indent === 0 || !cur) {
      cur = { root: item, children: [] };
      blocks.push(cur);
    } else {
      cur.children.push(item);
    }
  }
  // Sort: incomplete (root not checked) first, complete last
  blocks.sort((a, b) => {
    const aD = a.root.type === 'task' && a.root.checked ? 1 : 0;
    const bD = b.root.type === 'task' && b.root.checked ? 1 : 0;
    return aD - bD;
  });
  return blocks.flatMap((b) => [b.root, ...b.children]);
}

// ============ Rendering ============
function renderSync(isError) {
  const el = $('#sync-pill');
  if (!el) return;
  el.classList.remove('saving', 'error');
  if (state.saving) { el.classList.add('saving'); el.lastElementChild.textContent = '저장 중'; }
  else if (isError) { el.classList.add('error'); el.lastElementChild.textContent = '저장 실패'; }
  else el.lastElementChild.textContent = '동기화됨';
}
