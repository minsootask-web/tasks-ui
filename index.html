// 완료된 최상위 할 일을 블록(하위 포함) 단위로 한 번에 보관함 이동
async function onBulkArchiveDone() {
  const targets = [];
  state.sections.forEach((sec) => {
    const priority = Object.keys(SECTION_KEYS).find((k) => SECTION_KEYS[k] === sec.title) || 'medium';
    sec.items.forEach((i) => {
      if (i.type === 'task' && i.checked && i.indent === 0 && i.text.trim()) {
        targets.push({ lineIndex: i.lineIndex, priority });
      }
    });
  });
  if (!targets.length) { toast('완료된 항목이 없습니다'); return; }
  if (!confirm(`완료된 ${targets.length}개 항목을 보관함으로 옮길까요?`)) return;
  try {
    const lines = state.content.split('\n');
    const ranges = [];
    const entries = targets.map((t) => {
      const { start, end } = extractBlock(lines, t.lineIndex);
      ranges.push({ start, end });
      return {
        id: genArchiveId(),
        deletedAt: new Date().toISOString(),
        source: 'active',
        priority: t.priority,
        block: lines.slice(start, end + 1),
      };
    });
    // 인덱스 밀림 방지: 뒤(큰 인덱스)에서부터 삭제
    ranges.sort((a, b) => b.start - a.start).forEach((r) => lines.splice(r.start, r.end - r.start + 1));
    const newContent = lines.join('\n');
    await ghLoadArchive();
    await ghSaveArchive([...state.archiveItems, ...entries], `archive ${entries.length} done tasks`);
    await ghSave(newContent, `archive ${entries.length} done tasks (from active)`);
    renderApp();
    toast(`${entries.length}개 보관됨`, 5000, { label: '실행취소', onClick: () => undoArchive(entries) });
  } catch (e) { toast(`실패: ${e.message}`); }
}

// 직전 일괄 보관을 취소 — 보관한 항목들을 Task 탭으로 되돌리고 보관함에서 제거
async function undoArchive(entries) {
  const ids = entries.map((e) => e.id);
  try {
    await ghLoad();
    const lines = state.content.split('\n');
    entries.forEach((entry) => {
      const want = SECTION_KEYS[entry.priority];
      const headerIdx = lines.findIndex((l) => l.match(/^##\s+(.+)$/)?.[1]?.trim() === want);
      if (headerIdx === -1) return;
      let insertAfter = headerIdx;
      for (let i = headerIdx + 1; i < lines.length; i++) {
        if (lines[i].startsWith('## ')) break;
        if (lines[i].trim() !== '') insertAfter = i;
      }
      const block = entry.block || [];
      if (lines[insertAfter].trim() === '-' || lines[insertAfter].trim() === '- ') {
        lines.splice(insertAfter, 1, ...block);
      } else {
        lines.splice(insertAfter + 1, 0, ...block);
      }
    });
    await ghSave(lines.join('\n'), `undo archive: restore ${entries.length}`);
    await ghLoadArchive();
    await ghSaveArchive(state.archiveItems.filter((i) => !ids.includes(i.id)), `undo archive: ${entries.length}`);
    currentTab = 'active';
    renderApp();
    toast(`${entries.length}개 복원됨`);
  } catch (e) { toast(`실패: ${e.message}`); }
}

function renderApp() {
  if (!state.token) { renderSetup(); return; }
  const app = $('#app');
  const totalLine = state.sections.reduce((acc, s) => {
    return acc + s.items.filter((i) => i.type === 'task' && i.text.trim()).length;
  }, 0);
  const doneLine = state.sections.reduce((acc, s) => {
    return acc + s.items.filter((i) => i.type === 'task' && i.checked && i.text.trim()).length;
  }, 0);

  const inboxCount = state.inboxItems.length;
  app.innerHTML = `
    <header>
      <div class="title-row">
        <h1 class="brand">${TAKO_LOGO}<span>tako</span></h1>
        <div class="meta">
          ${fmtDate(new Date())} · ${totalLine ? `${doneLine}/${totalLine} 완료` : ''}
          <span class="sync-pill" id="sync-pill"><span class="dot"></span><span>동기화됨</span></span>
        </div>
      </div>
      <div class="header-actions">${headerActions({ sort: true })}</div>
    </header>
    <div class="tabs">
      <button class="tab active" id="tab-active">Task</button>
      <button class="tab" id="tab-inbox">Inbox ${inboxCount ? `<span class="badge">${inboxCount}</span>` : ''}</button>
      <button class="tab" id="tab-memo">Memo</button>
      <button class="tab" id="tab-archive">Archive</button>
    </div>
    <div id="sections"></div>
  `;
  bindTabEvents();

  const root = $('#sections');
  ['high','medium','low'].forEach((key) => {
    const sec = findSectionByKey(key);
    if (!sec) return;
    const cls = key === 'high' ? 'pri-high' : key === 'medium' ? 'pri-med' : 'pri-low';
    const realItems = sec.items.filter((i) => (i.type === 'task' || i.type === 'bullet') && i.text.trim());
    const taskCount = sec.items.filter((i) => i.type === 'task' && i.text.trim()).length;

    const div = document.createElement('div');
    div.className = `section ${cls}`;
    const secIcon = key === 'high' ? '🍅' : key === 'medium' ? '🍋' : '🥝';
    div.innerHTML = `
      <div class="section-title">
        <span class="sec-ic">${secIcon}</span>${esc(sec.title.replace(/[🔥🟡🟢]/g, '').trim())}
        ${taskCount ? `<span class="count">${taskCount}</span>` : ''}
      </div>
      <div class="card"></div>
    `;
    const card = div.querySelector('.card');
    if (realItems.length === 0) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.textContent = '비어 있음';
      card.appendChild(e);
    } else {
      const displayItemsRaw = sortIncompleteFirst ? sortItemsIncompleteFirst(sec.items.filter((i) => i.text.trim())) : sec.items;
      const rows = displayItemsRaw.filter((i) => (i.type === 'task' || i.type === 'bullet') && i.text.trim());
      let collapseAtIndent = null; // 접힌 조상의 indent (그보다 깊은 항목은 숨김)
      rows.forEach((item, idx) => {
        // 접힘 범위를 벗어나면 해제
        if (collapseAtIndent !== null && item.indent <= collapseAtIndent) collapseAtIndent = null;
        if (collapseAtIndent !== null) return; // 접힌 조상 아래 → 렌더 생략
        const next = rows[idx + 1];
        const hasChildren = !!next && next.indent > item.indent;
        const collapsedNow = hasChildren && isCollapsed(item);
        if (item.type === 'task') {
          let hiddenCount = 0;
          if (collapsedNow) {
            for (let j = idx + 1; j < rows.length && rows[j].indent > item.indent; j++) hiddenCount++;
          }
          card.appendChild(renderTask(item, key, { hasChildren, collapsed: collapsedNow, hiddenCount }));
        } else {
          const b = document.createElement('div');
          b.className = `bullet indent-${Math.min(item.indent, 3)}`;
          b.textContent = '• ' + item.text;
          card.appendChild(b);
        }
        if (collapsedNow) collapseAtIndent = item.indent;
      });
    }
    root.appendChild(div);
  });
  $('#fab').hidden = false;
}

function renderTask(item, key, opts = {}) {
  const { hasChildren = false, collapsed = false, hiddenCount = 0 } = opts;
  const t = document.createElement('div');
  t.className = `task indent-${Math.min(item.indent, 3)}` + (item.checked ? ' done' : '');
  t.dataset.line = item.lineIndex;
  t.dataset.indent = item.indent;

  // 접기/펼치기 토글 — 자식 있는 항목만 화살표, 나머지는 정렬용 빈 자리
  const toggle = document.createElement('button');
  toggle.type = 'button';
  toggle.className = 'task-toggle' + (hasChildren ? '' : ' leaf');
  if (hasChildren) {
    toggle.textContent = collapsed ? '▸' : '▾';
    toggle.title = collapsed ? '펼치기' : '접기';
    toggle.setAttribute('aria-label', toggle.title);
    toggle.addEventListener('click', (e) => { e.stopPropagation(); toggleCollapse(item); });
  } else {
    toggle.tabIndex = -1;
  }

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = item.checked;
  cb.setAttribute('aria-label', `완료: ${item.text}`);
  cb.addEventListener('change', (e) => {
    if (e.target.checked) {
      cb.classList.remove('pop');
      void cb.offsetWidth; // reflow로 애니메이션 재시작
      cb.classList.add('pop');
    }
    onToggle(item.lineIndex, e.target.checked, t, cb);
  });

  const span = document.createElement('div');
  span.className = 'task-text';
  span.innerHTML = highlightMeta(item.text);
  if (collapsed && hiddenCount) {
    const badge = document.createElement('span');
    badge.className = 'child-count';
    badge.textContent = hiddenCount;
    badge.title = `숨겨진 하위 항목 ${hiddenCount}개`;
    span.appendChild(badge);
  }
  span.title = '탭하여 편집';
  span.addEventListener('click', (e) => {
    if (e.target.tagName === 'INPUT') return;
    openEditSheet(item);
  });

  const actions = document.createElement('div');
  actions.className = 'task-actions';

  const handle = document.createElement('button');
  handle.className = 'row-btn drag-handle';
  handle.title = '드래그하여 이동';
  handle.setAttribute('aria-label', '드래그하여 이동');
  handle.innerHTML = '⋮⋮';
  handle.addEventListener('pointerdown', (e) => onDragStart(e, item, key, t));
  handle.addEventListener('click', (e) => e.stopPropagation());
  actions.appendChild(handle);

  const del = document.createElement('button');
  del.className = 'row-btn danger';
  del.title = item.indent === 0 ? '보관함으로 이동' : '삭제';
  del.innerHTML = '×';
  del.addEventListener('click', (e) => { e.stopPropagation(); onDelete(item); });
  actions.appendChild(del);

  t.appendChild(toggle);
  t.appendChild(cb);
  t.appendChild(span);
  t.appendChild(actions);
  return t;
}

function renderSetup() {
  $('#fab').hidden = true;
  $('#app').innerHTML = `
    <div class="setup">
      <h1>초기 설정</h1>
      <p>이 앱은 GitHub의 <code>${OWNER}/${REPO}</code> 의 <code>${FILE}</code> 파일을 직접 읽고 씁니다. 처음 한 번만 GitHub Personal Access Token (PAT)을 입력해주세요. 토큰은 이 기기 브라우저에만 저장됩니다.</p>
      <ol>
        <li>github.com → Settings → Developer settings → Personal access tokens → <b>Fine-grained tokens</b></li>
        <li>"Generate new token" → 만료 기한 적절히 설정</li>
        <li>Repository access: <b>Only select repositories</b> → <code>${OWNER}/${REPO}</code> 선택</li>
        <li>Repository permissions → <b>Contents: Read and write</b> 만 부여</li>
        <li>생성된 <code>github_pat_…</code> 토큰을 아래 붙여넣기</li>
      </ol>
      <div class="field">
        <label>Fine-grained PAT</label>
        <input type="password" id="setup-token" placeholder="github_pat_..." autocomplete="off">
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="setup-save">저장하고 시작</button>
      </div>
      <div class="err" id="setup-err"></div>
    </div>
  `;
  $('#setup-save').addEventListener('click', onSetupSave);
  $('#setup-token').addEventListener('keydown', (e) => { if (e.key === 'Enter') onSetupSave(); });
}

async function onSetupSave() {
  const tok = $('#setup-token').value.trim();
  if (!tok) return;
  const errEl = $('#setup-err');
  errEl.textContent = '';
  state.token = tok;
  try {
    await ghLoad();
    localStorage.setItem('gh_pat', tok);
    renderApp();
    toast('연결됨');
  } catch (e) {
    state.token = null;
    if (e.code === 401) errEl.textContent = '토큰이 유효하지 않습니다.';
    else if (e.code === 404) errEl.textContent = `repo 또는 ${FILE} 파일을 찾을 수 없습니다.`;
    else errEl.textContent = `오류: ${e.message}`;
  }
}

// ============ Event handlers (CRUD) ============
async function safeMutate(producer, msg, label) {
  try {
    const newContent = producer();
    await ghSave(newContent, msg);
    renderApp();
    toast(label);
  } catch (e) {
    if (e.code === 409) {
      // Conflict: state.content was refreshed by ghSave. Re-render and notify.
      renderApp();
      toast('충돌 — 최신 데이터 가져옴, 다시 시도하세요');
    } else {
      toast(`실패: ${e.message}`);
      console.error(e);
    }
  }
}

// 토글 저장 큐 — UI는 즉시 반영(낙관적 업데이트)하고, 저장은 디바운스해
// 배경에서 한 번에 처리한다. 연속 체크/언체크 시 마지막 상태만 저장하므로
// 매 클릭마다 네트워크를 기다리거나 sha 409 충돌이 나지 않는다.
const toggleSync = { timer: null, saving: false, dirty: false };

function onToggle(lineIndex, checked, el) {
  el.classList.toggle('done', checked);
  // 로컬 상태 즉시 갱신 — 이후 토글은 이 최신 내용 위에 쌓인다.
  state.content = toggleAt(lineIndex, checked);
  state.sections = parseSections(state.content);
  clearTimeout(toggleSync.timer);
  toggleSync.timer = setTimeout(flushToggles, 400);
}

async function flushToggles() {
  if (toggleSync.saving) { toggleSync.dirty = true; return; }
  toggleSync.saving = true;
  const snapshot = state.content;
  try {
    await ghSave(snapshot, 'toggle tasks', { keepLocalState: true });
    // 저장 중 새 토글이 없을 때만 재렌더 (있으면 다음 flush가 처리)
    if (!toggleSync.dirty && state.content === snapshot) renderApp();
  } catch (e) {
    if (e.code === 409) {
      // 충돌: ghSave가 원격 최신 상태로 갱신함 — 화면을 원격 기준으로 되돌린다.
      renderApp();
      toast('충돌 — 최신 데이터 가져옴, 다시 시도하세요');
    } else {
      // 저장 실패: 원격 상태로 되돌려 로컬/원격 불일치를 막는다.
      await ghLoad().catch(() => {});
      renderApp();
      toast(`저장 실패: ${e.message}`);
      console.error(e);
    }
  } finally {
    toggleSync.saving = false;
    if (toggleSync.dirty) { toggleSync.dirty = false; flushToggles(); }
  }
}

function onAdd(priority, text) {
  return safeMutate(
    () => appendToSection(priority, text),
    `add: ${text}`,
    '추가됨'
  );
}

function onEdit(lineIndex, text) {
  return safeMutate(
    () => editLine(lineIndex, text),
    `edit: ${text}`,
    '수정됨'
  );
}

async function onDelete(item) {
  if (item.indent > 0) {
    if (!confirm(`삭제할까요?\n\n"${item.text}"`)) return;
    try {
      await ghSave(deleteAt(item.lineIndex), `delete sub: ${item.text}`);
      renderApp();
      toast('삭제됨');
    } catch (e) { toast(`실패: ${e.message}`); }
    return;
  }
  if (!confirm(`보관함으로 옮길까요?\n\n"${item.text}"`)) return;
  try {
    await archiveActiveTask(item);
    renderApp();
    toast('보관됨');
  } catch (e) {
    toast(`실패: ${e.message}`);
    console.error(e);
  }
}

// ============ Drag & Drop ============
const dragCtx = { active: false };

function onDragStart(e, item, key, taskEl) {
  if (e.button != null && e.button !== 0) return;
  e.preventDefault();
  e.stopPropagation();

  const rect = taskEl.getBoundingClientRect();
  const ghost = taskEl.cloneNode(true);
  ghost.classList.add('drag-ghost');
  ghost.classList.remove('dragging');
  ghost.style.left = rect.left + 'px';
  ghost.style.top = rect.top + 'px';
  ghost.style.width = rect.width + 'px';
  document.body.appendChild(ghost);

  const indicator = document.createElement('div');
  indicator.className = 'drop-indicator';

  const blockRange = extractBlock(state.content.split('\n'), item.lineIndex);

  dragCtx.active = true;
  dragCtx.srcLine = item.lineIndex;
  dragCtx.srcStart = blockRange.start;
  dragCtx.srcEnd = blockRange.end;
  dragCtx.srcKey = key;
  dragCtx.srcEl = taskEl;
  dragCtx.ghost = ghost;
  dragCtx.indicator = indicator;
  dragCtx.offsetX = e.clientX - rect.left;
  dragCtx.offsetY = e.clientY - rect.top;
  dragCtx.target = null;
  dragCtx.lastSection = null;

  taskEl.classList.add('dragging');
  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd);
  document.addEventListener('pointercancel', onDragEnd);
}

function onDragMove(e) {
  if (!dragCtx.active) return;
  const { ghost, indicator, offsetX, offsetY } = dragCtx;
  ghost.style.left = (e.clientX - offsetX) + 'px';
  ghost.style.top = (e.clientY - offsetY) + 'px';

  ghost.style.display = 'none';
  const el = document.elementFromPoint(e.clientX, e.clientY);
  ghost.style.display = '';
  if (!el) return;

  const section = el.closest('.section');
  if (dragCtx.lastSection && dragCtx.lastSection !== section) {
    dragCtx.lastSection.classList.remove('drop-active');
  }
  if (!section) {
    indicator.remove();
    dragCtx.target = null;
    dragCtx.lastSection = null;
    return;
  }
  section.classList.add('drop-active');
  dragCtx.lastSection = section;

  const sectionKey = section.classList.contains('pri-high') ? 'high'
                   : section.classList.contains('pri-med') ? 'medium' : 'low';

  const card = section.querySelector('.card');
  const taskUnder = el.closest('.task');

  const isOwnBlock = (el2) => {
    if (!el2) return false;
    const ln = +el2.dataset.line;
    return ln >= dragCtx.srcStart && ln <= dragCtx.srcEnd;
  };
  const clearInto = () => {
    if (dragCtx.intoEl) { dragCtx.intoEl.classList.remove('drop-into'); dragCtx.intoEl = null; }
  };

  if (taskUnder && card.contains(taskUnder) && !isOwnBlock(taskUnder)) {
    const r = taskUnder.getBoundingClientRect();
    const y = e.clientY - r.top;
    const zoneTop = r.height * 0.25;
    const zoneBottom = r.height * 0.75;

    if (y >= zoneTop && y <= zoneBottom) {
      indicator.remove();
      if (dragCtx.intoEl && dragCtx.intoEl !== taskUnder) dragCtx.intoEl.classList.remove('drop-into');
      taskUnder.classList.add('drop-into');
      dragCtx.intoEl = taskUnder;
      dragCtx.target = { sectionKey, intoLine: +taskUnder.dataset.line };
    } else if (y < zoneTop) {
      clearInto();
      indicator.style.marginLeft = '';
      card.insertBefore(indicator, taskUnder);
      dragCtx.target = { sectionKey, beforeLine: +taskUnder.dataset.line };
    } else {
      clearInto();
      card.insertBefore(indicator, taskUnder.nextSibling);
      let next = taskUnder.nextElementSibling;
      while (next && (!next.classList.contains('task') || isOwnBlock(next))) next = next.nextElementSibling;
      const underIndent = +taskUnder.dataset.indent || 0;
      const nextIndent = next ? (+next.dataset.indent || 0) : 0;
      if (nextIndent < underIndent) {
        // taskUnder is the last item of its sub-list, so the gap below it is depth-ambiguous:
        // it could attach to any ancestor between the next line's level and taskUnder's own.
        // Let the horizontal cursor position pick the depth — drag left to pop out toward
        // nextIndent, keep it under the row to stay as the last child (default).
        const cardLeft = card.getBoundingClientRect().left;
        const lvl = Math.round((e.clientX - cardLeft - 12) / 24);
        const chosenIndent = Math.max(nextIndent, Math.min(underIndent, lvl));
        indicator.style.marginLeft = (8 + chosenIndent * 24) + 'px';
        dragCtx.target = { sectionKey, beforeLine: next ? +next.dataset.line : null, indent: chosenIndent };
      } else {
        indicator.style.marginLeft = '';
        dragCtx.target = { sectionKey, beforeLine: next ? +next.dataset.line : null };
      }
    }
  } else {
    clearInto();
    indicator.style.marginLeft = '';
    card.appendChild(indicator);
    dragCtx.target = { sectionKey, beforeLine: null };
  }
}

function onDragEnd() {
  if (!dragCtx.active) return;
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  document.removeEventListener('pointercancel', onDragEnd);

  const { srcLine, srcEl, ghost, indicator, target, lastSection, intoEl } = dragCtx;
  ghost?.remove();
  indicator?.remove();
  srcEl?.classList.remove('dragging');
  lastSection?.classList.remove('drop-active');
  intoEl?.classList.remove('drop-into');
  dragCtx.intoEl = null;
  dragCtx.active = false;

  if (!target) return;
  if (target.beforeLine === srcLine) return;
  if (target.intoLine === srcLine) return;

  safeMutate(
    () => moveLineToPosition(srcLine, target),
    `move: ${SECTION_KEYS[target.sectionKey]}`,
    '이동됨'
  );
}

// ============ Sheet (add/edit) ============
function openAddSheet() {
  sheetMode = 'add';
  editingLine = -1;
  editingIsSub = false;
  $('#pri-picker').closest('.field').hidden = false;
  $('#sheet-title').textContent = '새 할 일';
  $('#sheet-text').value = '';
  selectPriority('medium');
  showSheet();
}

// 우선순위 라디오 선택 상태(class·aria-checked·roving tabindex)를 일괄 갱신
function selectPriority(pri) {
  $('#pri-picker').querySelectorAll('.pri-pill').forEach((p) => {
    const on = p.dataset.pri === pri;
    p.classList.toggle('selected', on);
    p.setAttribute('aria-checked', on ? 'true' : 'false');
    p.tabIndex = on ? 0 : -1;
  });
}

function openInboxSheet() {
  sheetMode = 'inbox';
  editingLine = -1;
  $('#sheet-title').textContent = 'Inbox에 추가';
  $('#sheet-text').value = '';
  $('#pri-picker').closest('.field').hidden = true;
  showSheet();
}

function openEditSheet(item) {
  sheetMode = 'edit';
  editingLine = item.lineIndex;
  editingIsSub = item.indent > 0;
  $('#sheet-title').textContent = editingIsSub ? '하위 할 일 편집' : '편집';
  $('#sheet-text').value = item.text;
  // 하위 할 일은 우선순위(섹션) 개념이 없으므로 우선순위 선택을 숨긴다
  const priField = $('#pri-picker').closest('.field');
  if (editingIsSub) {
    priField.hidden = true;
  } else {
    priField.hidden = false;
    // current section
    const sec = state.sections.find((s) => s.items.some((i) => i.lineIndex === item.lineIndex));
    const cur = Object.keys(SECTION_KEYS).find((k) => SECTION_KEYS[k] === sec?.title) || 'medium';
    selectPriority(cur);
  }
  showSheet();
}

let sheetLastFocus = null;

function showSheet() {
  sheetLastFocus = document.activeElement;
  const sheet = $('#sheet');
  sheet.removeAttribute('inert');
  $('#scrim').classList.add('show');
  sheet.classList.add('show');
  setTimeout(() => $('#sheet-text').focus(), 100);
}
function hideSheet() {
  const sheet = $('#sheet');
  $('#scrim').classList.remove('show');
  sheet.classList.remove('show');
  $('#pri-picker').closest('.field').hidden = false;
  // 닫힌 시트를 탭 순서·접근성 트리에서 제외하고, 포커스를 열었던 요소로 되돌린다
  sheet.setAttribute('inert', '');
  if (sheetLastFocus && typeof sheetLastFocus.focus === 'function') {
    sheetLastFocus.focus();
  }
  sheetLastFocus = null;
}

// 시트가 열려 있는 동안 Tab 포커스를 시트 내부에 가둔다
function trapSheetFocus(e) {
  const sheet = $('#sheet');
  if (!sheet.classList.contains('show')) return;
  if (e.key === 'Escape') { e.preventDefault(); hideSheet(); return; }
  if (e.key !== 'Tab') return;
  const focusable = sheet.querySelectorAll(
    'a[href], button:not([disabled]), input:not([disabled]), textarea:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"])'
  );
  const items = [...focusable].filter((el) => el.offsetParent !== null || el === document.activeElement);
  if (!items.length) return;
  const first = items[0];
  const last = items[items.length - 1];
  if (e.shiftKey && document.activeElement === first) {
    e.preventDefault(); last.focus();
  } else if (!e.shiftKey && document.activeElement === last) {
    e.preventDefault(); first.focus();
  }
}

function sheetSave() {
  const text = $('#sheet-text').value.trim();
  if (!text) return;
  const pri = $('#pri-picker .pri-pill.selected')?.dataset.pri || 'medium';
  hideSheet();
  if (sheetMode === 'inbox') {
    onAddToInbox(text);
  } else if (sheetMode === 'add') {
    onAdd(pri, text);
  } else if (editingIsSub) {
    // 하위 할 일: 우선순위(섹션) 개념이 없으므로 텍스트만 수정
    onEdit(editingLine, text);
  } else {
    // Edit: if priority changed, also move
    const sec = state.sections.find((s) => s.items.some((i) => i.lineIndex === editingLine));
    const curKey = Object.keys(SECTION_KEYS).find((k) => SECTION_KEYS[k] === sec?.title) || 'medium';
    if (curKey !== pri) {
      // Edit then move — do as two saves to keep mutations simple
      safeMutate(
        () => {
          const c1 = editLine(editingLine, text);
          state.content = c1;
          state.sections = parseSections(c1);
          return moveLineToSection(editingLine, pri);
        },
        `edit+move: ${text}`,
        '수정됨'
      );
    } else {
      onEdit(editingLine, text);
    }
  }
}

async function onAddToInbox(text) {
  try {
    await ghLoadInbox();
    let c = state.inboxContent;
    if (c && !c.endsWith('\n')) c += '\n';
    c += `- ${text}\n`;
    await ghSaveInbox(c, `inbox: add ${text}`);
    toast('Inbox에 추가됨');
    if (currentTab === 'inbox') renderInbox();
  } catch (e) { toast(`실패: ${e.message}`); }
}

// ============ Init ============
function init() {
  updateThemeColorMeta();
  $('#fab').addEventListener('click', () => {
    if (currentTab === 'memo') onAddMemo();
    else if (currentTab === 'inbox' || currentTab === 'archive') openInboxSheet();
    else openAddSheet();
  });

  bindBarEvents();
  $('#archive-bar-select-all')?.addEventListener('click', () => {
    const all = state.archiveItems.length;
    if (selectedArchive.size === all) selectedArchive.clear();
    else state.archiveItems.forEach((e) => selectedArchive.add(e.id));
    renderArchive();
  });
  $('#archive-bar-restore')?.addEventListener('click', onBulkRestore);
  $('#archive-bar-purge')?.addEventListener('click', onBulkPurge);
  $('#scrim').addEventListener('click', hideSheet);
  $('#sheet-cancel').addEventListener('click', hideSheet);
  $('#sheet-save').addEventListener('click', sheetSave);
  $('#sheet').addEventListener('keydown', trapSheetFocus);
  $('#sheet-text').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sheetSave();
  });
  $('#pri-picker').addEventListener('click', (e) => {
    const pill = e.target.closest('.pri-pill');
    if (!pill) return;
    selectPriority(pill.dataset.pri);
    pill.focus();
  });
  $('#pri-picker').addEventListener('keydown', (e) => {
    const pills = [...$('#pri-picker').querySelectorAll('.pri-pill')];
    if (e.key === ' ' || e.key === 'Enter') {
      const pill = e.target.closest('.pri-pill');
      if (pill) { e.preventDefault(); selectPriority(pill.dataset.pri); }
      return;
    }
    const fwd = e.key === 'ArrowRight' || e.key === 'ArrowDown';
    const back = e.key === 'ArrowLeft' || e.key === 'ArrowUp';
    if (!fwd && !back) return;
    e.preventDefault();
    const cur = $('#pri-picker .pri-pill.selected')?.dataset.pri;
    const idx = pills.findIndex((p) => p.dataset.pri === cur);
    const nextIdx = (idx + (fwd ? 1 : -1) + pills.length) % pills.length;
    selectPriority(pills[nextIdx].dataset.pri);
    pills[nextIdx].focus();
  });

  document.addEventListener('click', (e) => {
    if (e.target.closest('#sort-btn')) { sortIncompleteFirst = !sortIncompleteFirst; renderApp(); return; }

    const moreBtn = e.target.closest('#more-btn');
    if (moreBtn) {
      const menu = $('#more-menu');
      if (menu && menu.classList.contains('show')) closeMoreMenu();
      else openMoreMenu(moreBtn);
      return;
    }

    const mi = e.target.closest('.menu-item');
    if (mi) {
      if (mi.disabled) return;
      closeMoreMenu();
      if (mi.id === 'menu-refresh') refresh();
      else if (mi.id === 'menu-archive-done') onBulkArchiveDone();
      else if (mi.id === 'menu-theme') toggleTheme();
      else if (mi.id === 'menu-token') openSettings();
      return;
    }

    // 메뉴 밖 클릭 시 닫기
    const openMenu = $('#more-menu.show');
    if (openMenu && !e.target.closest('.menu-wrap')) closeMoreMenu();
  });

  // Esc로 메뉴 닫기
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeMoreMenu();
  });

  // PWA SW
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // Refresh on visibility
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && state.token) refresh();
  });

  // Re-layout memos on resize (column count may change)
  let resizeTimer;
  window.addEventListener('resize', () => {
    if (currentTab !== 'memo') return;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => drawMemos(), 120);
  });

  // Initial render
  if (!state.token) {
    renderSetup();
  } else {
    renderApp();
    Promise.all([ghLoad(), ghLoadInbox(), ghLoadArchive(), ghLoadMemos()]).then(() => renderApp()).catch(() => {});
  }
}

async function refresh() {
  if (!state.token) return;
  try {
    await Promise.all([ghLoad(), ghLoadInbox(), ghLoadArchive(), ghLoadMemos()]);
    if (currentTab === 'inbox') renderInbox();
    else if (currentTab === 'archive') renderArchive();
    else if (currentTab === 'memo') renderMemos();
    else renderApp();
  } catch (e) {
    if (e.code === 401) {
      localStorage.removeItem('gh_pat');
      state.token = null;
      renderSetup();
      const err = document.querySelector('#setup-err');
      if (err) err.textContent = '토큰이 만료되었거나 권한이 변경되었습니다. 다시 입력해주세요.';
    } else {
      toast(`로드 실패: ${e.message}`);
    }
  }
}

function openSettings() {
  if (confirm('토큰을 재입력하시겠습니까?\n(기존 토큰은 로컬에서 삭제됩니다)')) {
    localStorage.removeItem('gh_pat');
    state.token = null;
    renderSetup();
  }
}

init();
</script>
